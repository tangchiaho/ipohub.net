<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPOHub — IPO 雷達｜即時追蹤全球與台灣 IPO 管線</title>
  <meta name="description" content="IPOHub IPO 雷達為台灣投資人提供即時 IPO 管線資訊，涵蓋申報狀態、上市市場、產業別與申報日期，搭配 AI 整理的重點資訊，協助掌握關鍵發行時點。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="/" class="logo">IPOHub</a>
      <ul class="nav-links">
        <li><a href="/">首頁</a></li>
        <li><a href="/ipo-radar/" class="active">IPO 雷達</a></li>
        <li><a href="/ipo-companies/">公司名單</a></li>
        <li><a href="/ipo-pipeline/">IPO 管線</a></li>
        <li><a href="/industry/">產業情報</a></li>
        <li><a href="/insights/">洞見</a></li>
        <li><a href="/about/">關於 IPOHub</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <section class="hero fade-in">
      <div class="container">
        <h1 class="headline">IPO 雷達</h1>
        <p class="subheadline">
          一眼掌握最新申報、即將上市與 IPO 管線情報，串接主要市場的關鍵動態。
        </p>
      </div>
    </section>

    <section class="section fade-in">
      <div class="container">
        <h2 class="h2">即時 IPO 管線</h2>
        <p class="subtitle">以下為示意資料，展示 IPOHub 如何結構化申報資訊、市場與狀態。</p>

        <div class="table-wrapper">
          <table id="ipo-table">
            <thead>
              <tr>
                <th>公司</th>
                <th>產業</th>
                <th>市場</th>
                <th>狀態</th>
                <th>申報日期</th>
              </tr>
            </thead>
            <tbody id="ipo-table-body">
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const tbody = document.getElementById('ipo-table-body');
      if (!tbody) return;

      const SECTOR_LABELS = {
        'Consumer Internet': '消費性網路',
        'SaaS': 'SaaS',
        'Semiconductors': '半導體',
        'Consumer': '消費',
        'Fintech': '金融科技'
      };

      const STATUS_LABELS = {
        filed: '已申報',
        listed: '已上市',
        priced: '已訂價',
        expected: '預期',
        withdrawn: '撤回'
      };

      function formatDate(value) {
        if (!value || String(value).toUpperCase() === 'TBD') return 'TBD';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return date.toLocaleDateString('zh-TW');
      }

      function createRow(record) {
        const tr = document.createElement('tr');

        const companyTd = document.createElement('td');
        companyTd.className = 'company-name';
        companyTd.textContent = record.company;

        const sectorTd = document.createElement('td');
        sectorTd.textContent = SECTOR_LABELS[record.sector] || record.sector;

        const marketTd = document.createElement('td');
        marketTd.textContent = record.market === 'Expected' ? '預期' : record.market;

        const statusTd = document.createElement('td');
        const statusSpan = document.createElement('span');
        const statusKey = String(record.status || '').toLowerCase();
        statusSpan.className = 'pill ' + statusKey;
        statusSpan.textContent = STATUS_LABELS[statusKey] || record.status;
        statusTd.appendChild(statusSpan);

        const filingDateTd = document.createElement('td');
        filingDateTd.textContent = formatDate(record.filingDate);

        tr.appendChild(companyTd);
        tr.appendChild(sectorTd);
        tr.appendChild(marketTd);
        tr.appendChild(statusTd);
        tr.appendChild(filingDateTd);

        return tr;
      }

      function renderRows(records) {
        tbody.innerHTML = '';
        if (!records || !records.length) {
          const tr = document.createElement('tr');
          const td = document.createElement('td');
          td.colSpan = 5;
          td.textContent = '目前沒有可顯示的 IPO 資料。';
          tr.appendChild(td);
          tbody.appendChild(tr);
          return;
        }
        records.forEach(function (record) {
          tbody.appendChild(createRow(record));
        });
      }

      fetch('../data/ipo.json')
        .then(function (res) {
          if (!res.ok) throw new Error('Network response was not ok');
          return res.json();
        })
        .then(function (data) {
          renderRows(data);
        })
        .catch(function () {
          renderRows([]);
        });
    })();
  </script>

  <footer class="footer">
    <div class="container">
      <p>IPOHub IPO 雷達 · 為投資人、券商與發行人提供 AI 驅動的 IPO 情報。</p>
    </div>
  </footer>

</body>
</html>
