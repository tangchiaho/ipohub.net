<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPOHub — 公司名單｜IPO 公司資料庫與觀察名單</title>
  <meta name="description" content="IPOHub 公司名單作為 IPO companies database，整理重點上市公司與潛在 IPO 標的，提供產業別、交易市場與簡要描述，協助台灣投資人建立觀察名單。">
  <meta name="keywords" content="IPO 公司, IPO companies database, 公司名單, 新股公司, 上市公司資料, IPO 觀察名單, IPOHub">
  <meta property="og:title" content="IPOHub — 公司名單｜IPO 公司資料庫">
  <meta property="og:description" content="瀏覽 IPOHub 精選的上市公司與潛在 IPO 標的，掌握產業與市場分布。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ipohub.net/companies.html">
  <meta property="og:site_name" content="IPOHub">
  <meta property="og:locale" content="zh_TW">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f9fc;
      --surface: #fff;
      --text: #1a1d29;
      --text-muted: #5c6178;
      --accent: #0f62fe;
      --accent-hover: #0043ce;
      --border: #e4e7ef;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 24px;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -1px;
    }
    nav ul {
      display: flex;
      list-style: none;
      gap: 24px;
    }
    nav ul li a {
      text-decoration: none;
      color: var(--text-muted);
      font-weight: 500;
      border-radius: var(--radius-sm);
      padding: 6px 14px;
      transition: background .15s, color .15s;
    }
    nav ul li a.active,
    nav ul li a:hover {
      color: var(--accent);
      background: #ecf4ff;
    }
    main {
      padding: 48px 0 0 0;
    }
    .page-title {
      font-size: 2.3rem;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -1px;
    }
    .subtitle {
      color: var(--text-muted);
      font-size: 1.15rem;
      margin-bottom: 36px;
    }
    .company-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 28px;
      margin-bottom: 60px;
    }
    .company-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 20px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: box-shadow .17s, border .17s;
    }
    .company-card:hover {
      border: 1.5px solid var(--accent);
      box-shadow: var(--shadow-lg);
    }
    .company-name {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 2px;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .company-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 16px;
      font-size: 0.97rem;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .company-meta span {
      display: inline-block;
      background: #f3f7fd;
      border-radius: var(--radius-sm);
      padding: 2px 10px;
    }
    .company-desc {
      color: var(--text);
      font-size: 1rem;
      margin-top: 2px;
    }
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 22px 0 18px 0;
      margin-top: 48px;
      color: var(--text-muted);
      font-size: 1rem;
      text-align: center;
    }
    @media (max-width: 700px) {
      .page-title { font-size: 1.5rem; }
      .company-card { padding: 18px 12px; }
      .container { padding: 0 10px; }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="container" style="display:flex;align-items:center;justify-content:space-between;">
      <a href="index.html" class="logo">IPO<span>Hub</span></a>
      <nav class="nav-links" style="display:flex;gap:28px;">
        <a href="index.html">首頁</a>
        <a href="radar.html">IPO 雷達</a>
        <a href="pipeline.html">IPO 管線</a>
        <a href="companies.html" class="active">公司名單</a>
        <a href="industry.html">產業情報</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      <h1 class="page-title">公司名單</h1>
      <p class="subtitle">瀏覽重點上市公司與潛在 IPO 標的，建立個人觀察名單。</p>
      <h2 class="h2">IPO 公司資料庫</h2>
      <p class="subtitle" style="margin-bottom:24px;">
        此頁示範 IPOHub 未來公司資料庫的呈現方式，可依產業、上市市場與 IPO 狀態進行篩選，協助台灣投資人快速縮小研究範圍。
      </p>
      <div class="company-grid" id="companies-grid">
        <!-- Cards injected from data/companies.json -->
      </div>
    </div>
  </main>
  <footer>
    <div class="container">
      IPOHub · 為投資人、券商與發行人提供 AI 驅動的 IPO 與公開市場情報。
    </div>
  </footer>

  <script>
    (function () {
      var grid = document.getElementById('companies-grid');
      if (!grid) return;
      function render(records) {
        grid.innerHTML = '';
        if (!records || !records.length) {
          grid.innerHTML = '<p class="subtitle">目前沒有可顯示的公司資料。</p>';
          return;
        }
        records.forEach(function (r) {
          var card = document.createElement('div');
          card.className = 'company-card';
          card.innerHTML =
            '<div class="company-name">' + escapeHtml(r.name) + '</div>' +
            '<div class="company-meta"><span>' + escapeHtml(r.sector) + '</span> <span>' + escapeHtml(r.market || '—') + '</span></div>' +
            '<div class="company-desc">' + escapeHtml(r.description || '') + '</div>';
          grid.appendChild(card);
        });
      }
      function escapeHtml(s) {
        if (s == null) return '';
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }
      fetch('data/companies.json')
        .then(function (res) { return res.ok ? res.json() : Promise.reject(); })
        .then(render)
        .catch(function () { render([]); });
    })();
  </script>
</body>
</html>
