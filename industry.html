<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>產業情報｜IPOHub｜產業趨勢與估值訊號</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="IPOHub 產業情報整理 AI、半導體、生技、金融科技、消費性網路與綠能等關鍵產業的趨勢與估值訊號，協助台灣投資人掌握長期投資主題。">
    <meta name="keywords" content="產業情報, industry intelligence, 產業趨勢, 估值訊號, IPO 產業, AI 產業, 半導體產業, 金融科技產業">
    <meta property="og:title" content="產業情報｜IPOHub｜產業趨勢與估值訊號">
    <meta property="og:description" content="透過 IPOHub 的產業情報，以主題方式觀察 AI、半導體、生技、金融科技、消費性網路與綠能等產業。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ipohub.net/industry.html">
    <meta property="og:site_name" content="IPOHub">
    <meta property="og:locale" content="zh_TW">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="container" style="display:flex;align-items:center;justify-content:space-between;">
            <a href="index.html" class="logo">IPO<span>Hub</span></a>
            <nav class="nav-links" style="display:flex;gap:28px;">
                <a href="index.html">首頁</a>
                <a href="radar.html">IPO 雷達</a>
                <a href="pipeline.html">IPO 管線</a>
                <a href="companies.html">公司名單</a>
                <a href="industry.html" class="active">產業情報</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content container">
        <header class="page-header">
            <h1>產業情報</h1>
            <p class="subtitle">掌握產業趨勢、估值訊號與市場主題，協助台灣投資人研究 IPO 與上市公司時具備完整產業脈絡。</p>
            <h2 class="h2">產業視角總覽</h2>
        </header>

        <section class="sector-cards-grid" id="industries-grid">
            <!-- Cards injected from data/industries.json -->
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 IPOHub. 版權所有。</p>
        </div>
    </footer>

    <script>
    (function () {
      var grid = document.getElementById('industries-grid');
      if (!grid) return;
      function escapeHtml(s) {
        if (s == null) return '';
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }
      function render(records) {
        grid.innerHTML = '';
        if (!records || !records.length) {
          grid.innerHTML = '<p class="subtitle">目前沒有可顯示的產業資料。</p>';
          return;
        }
        records.forEach(function (r) {
          var card = document.createElement('div');
          card.className = 'sector-card';
          card.innerHTML =
            '<h2>' + escapeHtml(r.name) + '</h2>' +
            '<p class="card-desc">' + escapeHtml(r.description || '') + '</p>' +
            '<div class="market-observation"><strong>市場觀察：</strong>' + escapeHtml(r.marketObservation || '') + '</div>';
          grid.appendChild(card);
        });
      }
      fetch('data/industries.json')
        .then(function (res) { return res.ok ? res.json() : Promise.reject(); })
        .then(render)
        .catch(function () { render([]); });
    })();
    </script>
</body>
</html>
