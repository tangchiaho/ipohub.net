<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPOHub — IPO 雷達｜台灣 IPO Radar 與申報管線</title>
  <meta name="description" content="IPOHub IPO 雷達為台灣投資人提供即時 IPO radar 與申報管線資訊，包含公司、產業、上市市場、狀態與申報日期。">
  <meta name="keywords" content="IPO 雷達, IPO radar Taiwan, 台灣 IPO, IPO 申報, 新股雷達, IPO 管線, IPO 情報">
  <meta property="og:title" content="IPOHub — IPO 雷達｜台灣 IPO Radar 與申報管線">
  <meta property="og:description" content="使用 IPOHub 的 IPO 雷達，追蹤台灣與全球市場的 IPO 申報與上市進度。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ipohub.net/radar.html">
  <meta property="og:site_name" content="IPOHub">
  <meta property="og:locale" content="zh_TW">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="navbar">
    <div class="container" style="display:flex;align-items:center;justify-content:space-between;">
      <a href="index.html" class="logo">IPO<span>Hub</span></a>
      <nav class="nav-links" style="display:flex;gap:28px;">
        <a href="index.html">首頁</a>
        <a href="radar.html" class="active">IPO 雷達</a>
        <a href="pipeline.html">IPO 管線</a>
        <a href="companies.html">公司名單</a>
        <a href="industry.html">產業情報</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero fade-in">
      <div class="container">
        <h1 class="headline">IPO 雷達</h1>
        <p class="subheadline">
          一眼掌握最新申報、即將上市與 IPO 管線情報，串接主要市場的關鍵動態。
        </p>
      </div>
    </section>

    <section class="section fade-in">
      <div class="container">
        <h2 class="h2">即時 IPO 管線</h2>
        <p class="subtitle">本頁呈現近期台灣資本市場相關動態，依申報日期由新到舊排序。</p>

        <div class="table-wrapper">
          <table id="ipo-table">
            <thead>
              <tr>
                <th>公司</th>
                <th>產業</th>
                <th>市場</th>
                <th>狀態</th>
                <th>申報日期</th>
              </tr>
            </thead>
            <tbody id="ipo-table-body">
              <!-- Rows will be injected from data/ipo.json -->
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const tbody = document.getElementById('ipo-table-body');
      if (!tbody) return;

      const SECTOR_LABELS = {
        'Consumer Internet': '消費性網路',
        'SaaS': 'SaaS',
        'Semiconductors': '半導體',
        'Consumer': '消費',
        'Fintech': '金融科技'
      };

      const STATUS_LABELS = {
        filed: '已申報',
        listed: '已上市',
        priced: '已訂價',
        expected: '預期',
        withdrawn: '撤回'
      };

      function formatDate(value) {
        if (!value || value.toUpperCase() === 'TBD') return 'TBD';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return date.toLocaleDateString('zh-TW');
      }

      function createRow(record) {
        const tr = document.createElement('tr');

        const companyTd = document.createElement('td');
        companyTd.className = 'company-name';
        companyTd.textContent = record.company;

        const sectorTd = document.createElement('td');
        sectorTd.textContent = SECTOR_LABELS[record.sector] || record.sector;

        const marketTd = document.createElement('td');
        marketTd.textContent = record.market === 'Expected' ? '預期' : record.market;

        const statusTd = document.createElement('td');
        const statusSpan = document.createElement('span');
        const statusKey = String(record.status || '').toLowerCase();
        statusSpan.className = 'pill ' + statusKey;
        statusSpan.textContent = STATUS_LABELS[statusKey] || record.status;
        statusTd.appendChild(statusSpan);

        const filingDateTd = document.createElement('td');
        filingDateTd.textContent = formatDate(record.filingDate);

        tr.appendChild(companyTd);
        tr.appendChild(sectorTd);
        tr.appendChild(marketTd);
        tr.appendChild(statusTd);
        tr.appendChild(filingDateTd);

        return tr;
      }

      function renderRows(records) {
        tbody.innerHTML = '';
        if (!records || !records.length) {
          const tr = document.createElement('tr');
          const td = document.createElement('td');
          td.colSpan = 5;
          td.textContent = 'No IPOs found.';
          tr.appendChild(td);
          tbody.appendChild(tr);
          return;
        }
        records.forEach(function (record) {
          tbody.appendChild(createRow(record));
        });
      }

      fetch('data/ipo.json')
        .then(function (res) {
          if (!res.ok) throw new Error('Network response was not ok');
          return res.json();
        })
        .then(function (data) {
          var list = Array.isArray(data) ? data.slice() : [];
          list.sort(function (a, b) {
            var da = (a.filingDate || '').toUpperCase();
            var db = (b.filingDate || '').toUpperCase();
            if (da === 'TBD' || !da) return 1;
            if (db === 'TBD' || !db) return -1;
            return db.localeCompare(da);
          });
          renderRows(list);
        })
        .catch(function () {
          renderRows([]);
        });
    })();
  </script>

  <footer>
    <div class="container">
      <p>IPOHub IPO 雷達 · 為投資人、券商與發行人提供 AI 驅動的 IPO 情報。</p>
    </div>
  </footer>

</body>
</html>
